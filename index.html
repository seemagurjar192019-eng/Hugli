<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hugli AI - Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="sidebar" class="sidebar">
        <a href="javascript:void(0)" class="closebtn" onclick="closeNav()">&times;</a>
        <div class="menu-items">
            <a href="#"><i class="fas fa-home"></i> Home</a>
            <a href="#"><i class="fas fa-image"></i> Image Gen <small>(Soon)</small></a>
            <a href="#"><i class="fas fa-video"></i> Video Gen <small>(Soon)</small></a>
            <a href="#" onclick="exitChat()"><i class="fas fa-sign-out-alt"></i> Exit</a>
        </div>
    </div>

    <div id="main">
        <div id="chat-container">
            <div id="chat-header">
                <button class="openbtn" onclick="openNav()"><i class="fas fa-bars"></i></button>
                <span>HUGLI AI</span>
                <div style="width:20px;"></div>
            </div>

            <div id="chat-box">
                <div class="ai-msg"><b>Hugli AI:</b> Swagat hai bhai! Bolo kya help karun?</div>
            </div>

            <div id="input-area">
                <input type="text" id="user-input" placeholder="Kuch likhiye..." autocomplete="off">
                <button id="send-btn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <script src="chat.js"></script>

    <script>
        // Sidebar functions
        function openNav() {
            document.getElementById("sidebar").style.width = "250px";
        }

        function closeNav() {
            document.getElementById("sidebar").style.width = "0";
        }

        function exitChat() {
            if(confirm("Kya aap exit karna chahte hain?")) {
                window.close();
            }
        }

        // Enter key support
        document.getElementById('user-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
    </script>
</body>
</html>
